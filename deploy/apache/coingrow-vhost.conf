<VirtualHost *:80>
    ServerName coingrow.example.com
    DocumentRoot /var/www/coingrow/public

    <Directory /var/www/coingrow/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/coingrow_error.log
    CustomLog ${APACHE_LOG_DIR}/coingrow_access.log combined

    RewriteEngine On

    # Keep Laravel front controller handling in public/.htaccess.
    # Uncomment below if you terminate TLS elsewhere and want forced HTTPS.
    # RewriteCond %{HTTPS} !=on
    # RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>
